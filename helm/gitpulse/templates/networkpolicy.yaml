apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gitpulse.fullname" . }}
  labels:
    {{- include "gitpulse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gitpulse.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressPodLabels }}
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressPodLabels | nindent 14 }}
        {{- end }}
        {{- range .Values.networkPolicy.ingressCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  egress:
    - ports:
        # DNS
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        # HTTPS (GitHub OAuth, GitHub API, Jira API, Anthropic API)
        - port: 443
          protocol: TCP
        # PostgreSQL
        - port: 5432
          protocol: TCP
