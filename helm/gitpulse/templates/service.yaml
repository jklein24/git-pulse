apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitpulse.fullname" . }}
  labels:
    {{- include "gitpulse.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "gitpulse.selectorLabels" . | nindent 4 }}
