name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-24.04-2-arm
    outputs:
      tag: ${{ steps.tags.outputs.tag }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: "Configure AWS credentials"
        if: github.event_name != 'pull_request'
        uses: "aws-actions/configure-aws-credentials@v6"
        with:
          role-to-assume: "arn:aws:iam::405785876631:role/github-actions-gitpulse"
          aws-region: "us-west-2"

      - name: "Log into ECR"
        if: github.event_name != 'pull_request'
        id: ecr-login
        uses: "aws-actions/amazon-ecr-login@v2"

      - name: "Setup builder"
        uses: "docker/setup-buildx-action@v4"

      - name: "Set image tags"
        id: tags
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "tags=${{ steps.ecr-login.outputs.registry }}/gitpulse:${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=gitpulse:${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: "Build image"
        uses: "docker/build-push-action@v7"
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          labels: |
            org.opencontainers.image.vendor=Lightspark
            org.opencontainers.image.title=gitpulse
          tags: ${{ steps.tags.outputs.tags }}
          load: true
          push: false

      - name: "Scan image for vulnerabilities"
        uses: "aquasecurity/trivy-action@0.35.0"
        with:
          image-ref: ${{ steps.tags.outputs.tags }}
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: "Push image"
        if: github.event_name != 'pull_request'
        uses: "docker/build-push-action@v7"
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          labels: |
            org.opencontainers.image.vendor=Lightspark
            org.opencontainers.image.title=gitpulse
          tags: ${{ steps.tags.outputs.tags }}
          push: true

  ci:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install ArgoCD CLI
        run: |
          ARGOCD_VERSION=$(curl -sSL -o /dev/null -w '%{url_effective}' https://github.com/argoproj/argo-cd/releases/latest | xargs basename)
          curl -sSL -o argocd "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-arm64"
          curl -sSL -o cli_checksums.txt "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/cli_checksums.txt"
          EXPECTED=$(grep 'argocd-linux-arm64$' cli_checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum argocd | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::ArgoCD CLI checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - uses: actions/github-script@v9
        id: script
        timeout-minutes: 10
        with:
          script: |
            const token = process.env['ACTIONS_RUNTIME_TOKEN']
            const runtimeUrl = process.env['ACTIONS_ID_TOKEN_REQUEST_URL']
            core.setOutput('TOKEN', token.trim())
            core.setOutput('IDTOKENURL', runtimeUrl.trim())

      - name: Authenticate via OIDC
        id: argocd-auth
        run: |
          GH_TOKEN_RESPONSE=$(curl -sSf \
            "${{ steps.script.outputs.IDTOKENURL }}" \
            -H "Authorization: bearer ${{ steps.script.outputs.TOKEN }}" \
            -H "Accept: application/json; api-version=2.0" \
            -H "Content-Type: application/json" \
            -d "{}")
          GH_TOKEN=$(jq -r .value <<< "$GH_TOKEN_RESPONSE")
          echo "::add-mask::$GH_TOKEN"

          DEX_URL="https://argocd.tooling.sparkinfra.net/api/dex/token"
          DEX_TOKEN_RESPONSE=$(curl -sSf \
            "$DEX_URL" \
            --user argo-cd-cli: \
            --data-urlencode "connector_id=github-actions" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "scope=openid email profile federated:id" \
            --data-urlencode "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
            --data-urlencode "subject_token=$GH_TOKEN" \
            --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token")
          DEX_TOKEN=$(jq -r .access_token <<< "$DEX_TOKEN_RESPONSE")

          if [[ -z "$DEX_TOKEN" ]]; then
            echo "::error::No token found in dex response"
            exit 1
          fi

          echo "::add-mask::$(echo "$DEX_TOKEN" | base64 -w0)"
          echo "::add-mask::$DEX_TOKEN"
          echo "token=$DEX_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update image tag
        env:
          ARGOCD_SERVER: argocd.tooling.sparkinfra.net
          ARGOCD_AUTH_TOKEN: ${{ steps.argocd-auth.outputs.token }}
        run: |
          argocd app set gitpulse \
            --parameter "image.tag=${{ needs.build.outputs.tag }}" \
            --grpc-web

      - name: Sync and wait for deployment
        env:
          ARGOCD_SERVER: argocd.tooling.sparkinfra.net
          ARGOCD_AUTH_TOKEN: ${{ steps.argocd-auth.outputs.token }}
        run: |
          argocd app sync gitpulse \
            --resource apps:Deployment:gitpulse \
            --timeout 300 \
            --grpc-web
          argocd app wait gitpulse \
            --resource apps:Deployment:gitpulse \
            --timeout 300 \
            --grpc-web
